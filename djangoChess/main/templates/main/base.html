<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chess Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #1a1a1a;
            background-image: radial-gradient(circle at 1px 1px, #444 1px, transparent 0);
            background-size: 20px 20px;
            color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
        }
        .glass-card {
            background: rgba(40, 40, 40, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-control, .form-select {
            background-color: rgba(22, 22, 22, 0.9);
            color: #f8f9fa;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(18, 18, 18, 1);
            color: #fff;
            border-color: #6a4bff;
            box-shadow: 0 0 0 0.15rem rgba(106, 75, 255, 0.25);
        }
        .list-group-item {
            background: transparent;
            color: #f8f9fa;
            border-color: rgba(255, 255, 255, 0.1);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lobby' %}"><i class="bi bi-grid-3x3-gap-fill me-2"></i>CHESS PLATFORM</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3">
                        Hello, <strong>{{ user.username }}</strong> 
                        <span class="badge bg-primary ms-1">{{ user.profile.rating }}</span>
                    </span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Login</a>
                    <a class="nav-link btn btn-primary btn-sm text-white px-3" href="{% url 'signup' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center text-muted py-4">
        <small>&copy; 2026 Chess Platform</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
