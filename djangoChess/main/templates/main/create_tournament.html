{% extends "main/base.html" %}

{% block title %}Create Tournament{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-9 glass-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0 fw-light">Create Tournament</h2>
            <a href="{% url 'lobby' %}" class="btn btn-outline-light btn-sm">Back to Lobby</a>
        </div>
        <form method="post" action="{% url 'create_tournament' %}">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Name</label>
                    <input class="form-control" name="name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Format</label>
                    <select class="form-select" name="format">
                        <option value="round_robin">Round Robin</option>
                        <option value="swiss">Swiss</option>
                        <option value="single_elim">Single Elimination</option>
                        <option value="double_elim">Double Elimination</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="3" name="description"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Min Players</label>
                    <input class="form-control" type="number" min="2" value="2" name="min_players">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Max Players</label>
                    <input class="form-control" type="number" min="2" value="8" name="max_players">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Games Per Pairing</label>
                    <input class="form-control" type="number" min="1" value="1" name="games_per_pairing">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Swiss Rounds (optional)</label>
                    <input class="form-control" type="number" min="0" value="0" name="swiss_rounds">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Entry Fee (ETH)</label>
                    <input class="form-control" type="number" step="0.000000000000000001" min="0" value="0" name="entry_fee_eth">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" checked name="invite_only" id="invite_only">
                        <label class="form-check-label" for="invite_only">Invite-only</label>
                    </div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary" type="submit">Create Tournament</button>
                <a href="{% url 'lobby' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
