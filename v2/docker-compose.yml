services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chess_arena
      POSTGRES_USER: chess_arena
      POSTGRES_PASSWORD: chess_arena
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      CHESS_ARENA_ENV: development
      CHESS_ARENA_DATABASE_URL: postgresql+asyncpg://chess_arena:chess_arena@postgres:5432/chess_arena
      CHESS_ARENA_REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  api-prod:
    profiles:
      - production
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --proxy-headers
    environment:
      CHESS_ARENA_ENV: production
      CHESS_ARENA_DATABASE_URL: ${CHESS_ARENA_DATABASE_URL:?set CHESS_ARENA_DATABASE_URL}
      CHESS_ARENA_REDIS_URL: ${CHESS_ARENA_REDIS_URL:?set CHESS_ARENA_REDIS_URL}
      CHESS_ARENA_SECRET_KEY: ${CHESS_ARENA_SECRET_KEY:?set CHESS_ARENA_SECRET_KEY}
      CHESS_ARENA_CORS_ALLOWED_ORIGINS: ${CHESS_ARENA_CORS_ALLOWED_ORIGINS:?set CHESS_ARENA_CORS_ALLOWED_ORIGINS}
      CHESS_ARENA_STRICT_HEALTH_CHECKS: "true"
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
